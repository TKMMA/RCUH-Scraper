name: Daily Job Scrape
on:
  schedule:
    # Runs at 18:00 UTC (8:00 AM HST) daily
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Increased timeout to 15 minutes to allow for throttled RCUH scraping
    timeout-minutes: 15 
    steps:
      - name: Checkout Metadata
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper
        run: python scraper.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add jobs.json
          # Only commit if there are actual changes to the data
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update jobs.json" && git push)
