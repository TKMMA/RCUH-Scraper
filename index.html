<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAR Career Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #f4f7f9; font-family: 'Segoe UI', sans-serif; }
        h2 { color: #003366; font-weight: 700; border-left: 6px solid #ce9d00; padding-left: 15px; margin-top: 40px; }
        .table thead { background-color: #003366; color: white; }
        
        /* Filter Button Styling */
        .filter-container { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .filter-btn { 
            font-size: 0.75rem; font-weight: bold; border-radius: 20px; padding: 4px 14px;
            border: 2px solid #003366; background: #fff; color: #003366; transition: 0.2s;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .filter-btn.active { background: #003366; color: #fff; }
        .filter-btn.inactive { opacity: 0.3; background: #e9ecef; color: #6c757d; border-color: #dee2e6; }
        
        .salary-toggle { background-color: #ce9d00; color: #003366; font-size: 0.7rem; font-weight: bold; border: 1px solid #003366; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .btn-apply { background-color: #ce9d00; color: #003366; font-weight: bold; border: none; padding: 5px 15px; }
        
        /* Deep Gray Active Selection */
        tr.shown { background-color: #cbd5e0 !important; border-left: 6px solid #ce9d00; } 
        .duties-box { 
            padding: 25px; background: #cbd5e0; border-bottom: 4px solid #ce9d00;
            color: #1a202c; box-shadow: inset 0 4px 10px rgba(0,0,0,0.15);
        }
        .duties-header { color: #003366; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px; border-bottom: 2px solid #ce9d00; display: inline-block; }
        .cursor-pointer tbody tr { cursor: pointer; transition: background 0.1s; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold" style="color: #003366;">DAR Job Opportunities</h1>
        <div id="status" class="small text-muted">Initializing Bot Scan...</div>
    </div>

    <h2>DLNR Civil Service Listings</h2>
    <div id="civilFilters" class="filter-container"></div>
    <div class="card p-3 mb-5 border-0 shadow-sm">
        <table id="civilTable" class="table table-hover w-100 cursor-pointer">
            <thead>
                <tr>
                    <th>Title</th><th>ID</th><th>Division</th><th>Location</th>
                    <th>Salary <button class="salary-toggle toggle-btn">Show /mo</button></th>
                    <th>Closing</th><th>Action</th>
                </tr>
            </thead>
        </table>
    </div>

    <h2>RCUH Contract Positions</h2>
    <div id="rcuhFilters" class="filter-container"></div>
    <div class="card p-3 border-0 shadow-sm">
        <table id="rcuhTable" class="table table-hover w-100 cursor-pointer">
            <thead>
                <tr>
                    <th>Title</th><th>ID</th><th>Location</th>
                    <th>Salary <button class="salary-toggle toggle-btn">Show /mo</button></th>
                    <th>Deadline</th><th>Action</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
    let viewMonthly = false;

    const salRender = d => {
        if (!d) return '<span class="text-muted small">See Listing</span>';
        let val = viewMonthly ? d / 12 : d;
        return `<strong>$${val.toLocaleString(undefined, {maximumFractionDigits: 0})}</strong>/${viewMonthly ? 'mo' : 'yr'}`;
    };

    function formatExpansion(d) {
        return `<div class="duties-box"><div class="duties-header">Position Summary & Duties</div><div class="mt-2" style="line-height: 1.6;">${d.duties}</div></div>`;
    }

    fetch('jobs.json').then(r => r.json()).then(data => {
        document.getElementById('status').innerText = `Last Updated: ${new Date(data.generated_at_utc).toLocaleString()}`;

        // Setup Civil Service Table & Filters
        const divisions = [...new Set(data.civil_service.map(j => j.division))].sort();
        if (!divisions.includes("Aquatic Resources")) divisions.unshift("Aquatic Resources");
        
        divisions.forEach(div => {
            $('#civilFilters').append(`<button class="filter-btn active" data-type="civil" data-val="${div}">${div} ✕</button>`);
        });

        const cTable = $('#civilTable').DataTable({
            data: data.civil_service,
            pageLength: 10,
            columns: [
                { data: 'title', className: 'fw-bold' }, { data: 'job_number' }, { data: 'division' }, { data: 'location' },
                { data: 'yearly_salary', render: salRender }, { data: 'closing' },
                { data: 'link', render: l => `<a href="${l}" target="_blank" class="btn btn-sm btn-apply">Apply</a>` }
            ]
        });

        // Setup RCUH Table & Keywords
        const rcuhKeywords = ["DAR", "Coral", "Fish", "HCRI"];
        rcuhKeywords.forEach(kw => {
            $('#rcuhFilters').append(`<button class="filter-btn active" data-type="rcuh" data-val="${kw}">${kw} ✕</button>`);
        });

        const rTable = $('#rcuhTable').DataTable({
            data: data.rcuh,
            pageLength: 10,
            columns: [
                { data: 'title', className: 'fw-bold' }, { data: 'id' }, { data: 'location' },
                { data: 'yearly_salary', render: salRender }, { data: 'closing' },
                { data: 'link', render: l => `<a href="${l}" target="_blank" class="btn btn-sm btn-apply">Apply</a>` }
            ]
        });

        // Global Filter Handler
        $(document).on('click', '.filter-btn', function() {
            $(this).toggleClass('active inactive');
            const type = $(this).data('type');
            const table = type === 'civil' ? cTable : rTable;
            const activeFilters = [];
            $(`.filter-btn.active[data-type="${type}"]`).each(function() { activeFilters.push($(this).data('val')); });

            if (type === 'civil') {
                const regex = activeFilters.map(f => `^${f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}$`).join('|');
                table.column(2).search(activeFilters.length ? regex : 'NONE_VISIBLE', true, false).draw();
            } else {
                const regex = activeFilters.join('|');
                table.search(activeFilters.length ? regex : 'NONE_VISIBLE', true, false).draw();
            }
        });

        // Click-to-Expand with selection styling
        $('.table tbody').on('click', 'td:not(:last-child)', function () {
            const table = $(this).closest('table').DataTable();
            const tr = $(this).closest('tr');
            const row = table.row(tr);
            if (row.child.isShown()) { row.child.hide(); tr.removeClass('shown'); }
            else {
                table.rows().every(function() { if(this.child.isShown()){ this.child.hide(); $(this.node()).removeClass('shown'); }});
                row.child(formatExpansion(row.data())).show(); tr.addClass('shown');
            }
        });

        $('.toggle-btn').on('click', function(e) {
            e.stopPropagation();
            viewMonthly = !viewMonthly;
            $('.toggle-btn').text(viewMonthly ? 'Show /yr' : 'Show /mo');
            cTable.rows().invalidate().draw(); rTable.rows().invalidate().draw();
        });
    });
</script>
</body>
</html>
