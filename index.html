<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCUH Contract Positions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <style>
        :root {
            --bg: #F9FAFB;
            --text-main: #000000;
            --text-accent: #005995;
            --accent: #40E0D0;
            --secondary-accent: #0084DF;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        h2 {
            color: var(--text-accent);
            font-weight: 700;
            border-left: 6px solid var(--accent);
            padding-left: 15px;
            margin-top: 10px;
        }

        .table thead {
            background-color: var(--text-accent);
            color: #ffffff;
        }

        .filter-container {
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .filter-btn {
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 20px;
            padding: 4px 14px;
            border: 2px solid var(--text-accent);
            background: #ffffff;
            color: var(--text-accent);
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn.active {
            background: var(--text-accent);
            color: #ffffff;
        }

        .filter-btn.inactive {
            opacity: 0.35;
            background: #e9ecef;
            color: #6c757d;
            border-color: #dee2e6;
        }

        .salary-toggle {
            background-color: var(--accent);
            color: var(--text-main);
            font-size: 0.7rem;
            font-weight: 700;
            border: 1px solid var(--secondary-accent);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-apply {
            background-color: var(--secondary-accent);
            color: #ffffff;
            font-weight: 700;
            border: none;
            padding: 5px 15px;
        }

        tr.shown {
            background-color: #d8f7f3 !important;
            border-left: 6px solid var(--accent);
        }

        .duties-box {
            padding: 25px;
            background: #e5f4ff;
            border-bottom: 4px solid var(--secondary-accent);
            color: var(--text-main);
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .duties-header {
            color: var(--text-accent);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
        }

        .cursor-pointer tbody tr {
            cursor: pointer;
            transition: background 0.1s;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-4">
        <div id="status" class="small" style="color: var(--text-accent);">Initializing scan...</div>
    </div>

    <h2>RCUH Contract Positions</h2>
    <div id="rcuhFilters" class="filter-container"></div>
    <div class="card p-3 border-0 shadow-sm">
        <table id="rcuhTable" class="table table-hover w-100 cursor-pointer">
            <thead>
                <tr>
                    <th>Title</th><th>ID</th><th>Location</th>
                    <th>Salary <button class="salary-toggle toggle-btn">Show /mo</button></th>
                    <th>Deadline</th><th>Action</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
    let viewMonthly = false;

    const salRender = d => {
        if (!d) return '<span class="text-muted small">See Listing</span>';
        const val = viewMonthly ? d / 12 : d;
        return `<strong>$${val.toLocaleString(undefined, {maximumFractionDigits: 0})}</strong>/${viewMonthly ? 'mo' : 'yr'}`;
    };

    function formatExpansion(d) {
        return `<div class="duties-box"><div class="duties-header">Position Summary & Duties</div><div class="mt-2" style="line-height: 1.6;">${d.duties}</div></div>`;
    }

    fetch('jobs.json').then(r => r.json()).then(data => {
        document.getElementById('status').innerText = `Last Updated: ${new Date(data.generated_at_utc).toLocaleString()}`;

        const rcuhKeywords = ["DAR", "Coral", "Fish", "HCRI"];
        rcuhKeywords.forEach(kw => {
            $('#rcuhFilters').append(`<button class="filter-btn active" data-val="${kw}">${kw} ✕</button>`);
        });

        const rTable = $('#rcuhTable').DataTable({
            data: data.rcuh || [],
            pageLength: 10,
            columns: [
                { data: 'title', className: 'fw-bold' }, { data: 'id' }, { data: 'location' },
                { data: 'yearly_salary', render: salRender }, { data: 'closing' },
                { data: 'link', render: l => `<a href="${l}" target="_blank" class="btn btn-sm btn-apply">Apply</a>` }
            ]
        });

        $(document).on('click', '.filter-btn', function() {
            $(this).toggleClass('active inactive');
            const activeFilters = [];
            $('.filter-btn.active').each(function() { activeFilters.push($(this).data('val')); });
            const regex = activeFilters.join('|');
            rTable.search(activeFilters.length ? regex : 'NONE_VISIBLE', true, false).draw();
        });

        $('.table tbody').on('click', 'td:not(:last-child)', function () {
            const table = $(this).closest('table').DataTable();
            const tr = $(this).closest('tr');
            const row = table.row(tr);
            if (row.child.isShown()) {
                row.child.hide();
                tr.removeClass('shown');
            } else {
                table.rows().every(function() {
                    if (this.child.isShown()) {
                        this.child.hide();
                        $(this.node()).removeClass('shown');
                    }
                });
                row.child(formatExpansion(row.data())).show();
                tr.addClass('shown');
            }
        });

        $('.toggle-btn').on('click', function(e) {
            e.stopPropagation();
            viewMonthly = !viewMonthly;
            $('.toggle-btn').text(viewMonthly ? 'Show /yr' : 'Show /mo');
            rTable.rows().invalidate().draw();
        });
    });
</script>
</body>
</html>
